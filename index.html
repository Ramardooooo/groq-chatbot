<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramardo AI</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="text-white h-screen flex">

<!-- Sidebar -->
<div class="w-72 glass p-4 border-r border-white/10 flex flex-col">
  <h1 class="text-xl font-bold mb-4">Ramardo AI</h1>
  <button onclick="newChat()" class="bg-blue-600 p-2 rounded mb-3">+ Chat Baru</button>
  <div id="history" class="flex-1 overflow-y-auto space-y-2"></div>
</div>

<!-- Chat Area -->
<div class="flex-1 flex flex-col">
  <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-4"></div>

  <div class="p-4 border-t border-white/10 flex gap-2">
    <input id="input" placeholder="Tanya apa aja..." class="flex-1 p-3 rounded bg-white/10 outline-none">
    <button onclick="send()" class="bg-blue-600 px-5 rounded">Kirim</button>
  </div>
</div>

<!-- JS -->
<script src="app.js"></script>
</body>
</html>
